<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<meta name="viewport"
content="width=device-width,initial-scale=1,user-scalable=no">

<title>Excavator Remote</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
    text-align:center;
}

#status{
    padding:10px;
    font-size:20px;
    font-weight:bold;
}

.connected{
    color:green;
}

.disconnected{
    color:red;
}

.main{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:10px;
}

.joystick{
    width:280px;
}

.grid{
    display:grid;
    grid-template-columns:90px 90px 90px;
    grid-template-rows:90px 90px 90px;
    gap:5px;
    justify-content:center;
}

button{
    font-size:18px;
    border:none;
    border-radius:12px;
    background:#ffffff;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

button:active{
    background:#d0e6ff;
}

.empty{
    visibility:hidden;
}

.trackRow{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:25px;
}

.trackGroup{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.trackGroup button{
    width:180px;
    height:70px;
}

.bucket{
    margin-top:25px;
}

.bucket button{
    width:380px;
    height:70px;
    margin:5px;
}

</style>

</head>

<body>

<div id="status" class="disconnected">
MQTT Connecting...
</div>

<div class="main">

    <!-- LEFT JOYSTICK -->

    <div class="joystick">

        <h3>Turret / Left Functions</h3>

        <div class="grid">

            <div class="empty"></div>
            <button id="tl">↺</button>
            <div class="empty"></div>

            <button id="lf">▲</button>
            <div class="empty"></div>
            <button id="lb">▼</button>

            <div class="empty"></div>
            <button id="tr">↻</button>
            <div class="empty"></div>

        </div>

    </div>

    <!-- RIGHT JOYSTICK -->

    <div class="joystick">

        <h3>Arm / Stick</h3>

        <div class="grid">

            <div class="empty"></div>
            <button id="au">▲</button>
            <div class="empty"></div>

            <button id="su">◀</button>
            <div class="empty"></div>
            <button id="sd">▶</button>

            <div class="empty"></div>
            <button id="ad">▼</button>
            <div class="empty"></div>

        </div>

    </div>

</div>

<!-- TRACKS -->

<div class="trackRow">

    <div class="trackGroup">

        <h3>Left Track</h3>

        <button id="leftForward">
            Forward
        </button>

        <button id="leftBackward">
            Backward
        </button>

    </div>

    <div class="trackGroup">

        <h3>Right Track</h3>

        <button id="rightForward">
            Forward
        </button>

        <button id="rightBackward">
            Backward
        </button>

    </div>

</div>

<!-- BUCKET -->

<div class="bucket">

    <h3>Bucket</h3>

    <button id="bu">
        Bucket Up
    </button>

    <br>

    <button id="bd">
        Bucket Down
    </button>

</div>

<script>

const client =
mqtt.connect(
'wss://broker.hivemq.com:8884/mqtt'
);

const timers = {};

client.on('connect',()=>{

    const s=document.getElementById("status");

    s.innerHTML="MQTT Connected";
    s.className="connected";
});

client.on('close',()=>{

    const s=document.getElementById("status");

    s.innerHTML="MQTT Disconnected";
    s.className="disconnected";
});

function publish(topic,value)
{
    if(client.connected)
    {
        client.publish(topic,value);
    }
}

function bind(id,topic)
{
    const btn=document.getElementById(id);

    function start()
    {
        publish(topic,"1");

        timers[id]=setInterval(()=>{
            publish(topic,"1");
        },200);
    }

    function stop()
    {
        clearInterval(timers[id]);
        publish(topic,"0");
    }

    btn.addEventListener("pointerdown",start);
    btn.addEventListener("pointerup",stop);
    btn.addEventListener("pointerleave",stop);
    btn.addEventListener("pointercancel",stop);
    btn.addEventListener("touchend",stop);
}

/* Turret */

bind("tl","excavator/turret/left");
bind("tr","excavator/turret/right");

/* Arm */

bind("au","excavator/arm/up");
bind("ad","excavator/arm/down");

/* Stick */

bind("su","excavator/stick/up");
bind("sd","excavator/stick/down");

/* Bucket */

bind("bu","excavator/bucket/up");
bind("bd","excavator/bucket/down");

/* Left Track */

bind("leftForward","excavator/left/fwd");
bind("leftBackward","excavator/left/rev");

/* Right Track */

bind("rightForward","excavator/right/fwd");
bind("rightBackward","excavator/right/rev");

</script>

</body>
</html>
