<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Excavator Remote</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body{
    font-family:Arial;
    text-align:center;
}

button{
    width:120px;
    height:80px;
    margin:4px;
    font-size:18px;
}
</style>
</head>
<body>

<h2>Excavator Control</h2>

<div id="status">Connecting...</div>

<script>

const client = mqtt.connect(
'wss://broker.hivemq.com:8884/mqtt'
);

client.on('connect',()=>{
    document.getElementById("status").innerHTML =
      "MQTT Connected";
});

function bind(btnId,topic)
{
  const btn=document.getElementById(btnId);

  btn.onpointerdown=()=>{
      client.publish(topic,"1");
  };

  btn.onpointerup=()=>{
      client.publish(topic,"0");
  };

  btn.onpointerleave=()=>{
      client.publish(topic,"0");
  };
}

</script>

<h3>Left Track</h3>

<button id="lf">Forward</button>
<button id="lb">Backward</button>

<h3>Right Track</h3>

<button id="rf">Forward</button>
<button id="rb">Backward</button>

<h3>Turret</h3>

<button id="tl">Left</button>
<button id="tr">Right</button>

<h3>Main Arm</h3>

<button id="au">Up</button>
<button id="ad">Down</button>

<h3>Stick Arm</h3>

<button id="su">Up</button>
<button id="sd">Down</button>

<h3>Bucket</h3>

<button id="bu">Up</button>
<button id="bd">Down</button>

<script>

bind("lf","excavator/left/fwd");
bind("lb","excavator/left/rev");

bind("rf","excavator/right/fwd");
bind("rb","excavator/right/rev");

bind("tl","excavator/turret/left");
bind("tr","excavator/turret/right");

bind("au","excavator/arm/up");
bind("ad","excavator/arm/down");

bind("su","excavator/stick/up");
bind("sd","excavator/stick/down");

bind("bu","excavator/bucket/up");
bind("bd","excavator/bucket/down");

</script>

</body>
</html>
