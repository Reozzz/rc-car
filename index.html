<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport"
content="width=device-width,initial-scale=1,user-scalable=no">

<title>Excavator Remote</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

html,
body{
    margin:0;
    padding:0;

    width:100%;
    height:100%;

    overflow:hidden;

    touch-action:none;
    overscroll-behavior:none;

    background:#f0f0f0;

    font-family:Arial;
}

#status{
    text-align:center;
    font-size:20px;
    font-weight:bold;
    padding:10px;
}

.connected{
    color:green;
}

.disconnected{
    color:red;
}

.main{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:5px;
}

.joystick{
    width:45%;
}

.grid{
    display:grid;

    grid-template-columns:
        100px
        100px
        100px;

    grid-template-rows:
        100px
        100px
        100px;

    gap:5px;

    justify-content:center;
}

button{

    border:none;

    border-radius:12px;

    font-size:22px;

    background:white;

    box-shadow:
      0 2px 6px rgba(0,0,0,0.2);

    user-select:none;

    -webkit-user-select:none;

    touch-action:none;
}

button:active{
    background:#d8ebff;
}

.empty{
    visibility:hidden;
}

.trackRow{

    display:flex;

    justify-content:center;

    gap:20px;

    margin-top:15px;
}

.trackGroup{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.trackGroup button{

    width:180px;
    height:70px;
}

.bucket{

    text-align:center;

    margin-top:15px;
}

.bucket button{

    width:380px;
    height:70px;

    margin:5px;
}

h3{
    text-align:center;
    margin-bottom:10px;
}

</style>

</head>

<body>

<div id="status"
class="disconnected">

MQTT Connecting...

</div>

<div class="main">

    <div class="joystick">

        <h3>Turret</h3>

        <div class="grid">

            <div class="empty"></div>
            <button id="tl">↺</button>
            <div class="empty"></div>

            <button id="lf">▲</button>
            <div class="empty"></div>
            <button id="lb">▼</button>

            <div class="empty"></div>
            <button id="tr">↻</button>
            <div class="empty"></div>

        </div>

    </div>

    <div class="joystick">

        <h3>Arm / Stick</h3>

        <div class="grid">

            <div class="empty"></div>
            <button id="au">▲</button>
            <div class="empty"></div>

            <button id="su">◀</button>
            <div class="empty"></div>
            <button id="sd">▶</button>

            <div class="empty"></div>
            <button id="ad">▼</button>
            <div class="empty"></div>

        </div>

    </div>

</div>

<div class="trackRow">

    <div class="trackGroup">

        <h3>Left Track</h3>

        <button id="leftForward">
            Forward
        </button>

        <button id="leftBackward">
            Backward
        </button>

    </div>

    <div class="trackGroup">

        <h3>Right Track</h3>

        <button id="rightForward">
            Forward
        </button>

        <button id="rightBackward">
            Backward
        </button>

    </div>

</div>

<div class="bucket">

    <h3>Bucket</h3>

    <button id="bu">
        Bucket Up
    </button>

    <br>

    <button id="bd">
        Bucket Down
    </button>

</div>

<script>

const client =
mqtt.connect(
'wss://broker.hivemq.com:8884/mqtt'
);

const timers = {};

client.on('connect',()=>{

    const s =
    document.getElementById("status");

    s.innerHTML =
    "MQTT Connected";

    s.className =
    "connected";
});

client.on('close',()=>{

    const s =
    document.getElementById("status");

    s.innerHTML =
    "MQTT Disconnected";

    s.className =
    "disconnected";
});

function publish(topic,value)
{
    if(client.connected)
    {
        client.publish(topic,value);
    }
}

function stopAllButtons()
{
    Object.keys(timers)
    .forEach(id=>{

        clearInterval(
            timers[id]
        );

        timers[id] = null;
    });

    publish(
    "excavator/left/fwd","0");

    publish(
    "excavator/left/rev","0");

    publish(
    "excavator/right/fwd","0");

    publish(
    "excavator/right/rev","0");

    publish(
    "excavator/turret/left","0");

    publish(
    "excavator/turret/right","0");

    publish(
    "excavator/arm/up","0");

    publish(
    "excavator/arm/down","0");

    publish(
    "excavator/stick/up","0");

    publish(
    "excavator/stick/down","0");

    publish(
    "excavator/bucket/up","0");

    publish(
    "excavator/bucket/down","0");
}

function bind(id,topic)
{
    const btn =
    document.getElementById(id);

    function start()
    {
        publish(topic,"1");

        clearInterval(
            timers[id]
        );

        timers[id] =
        setInterval(()=>{

            publish(
                topic,
                "1"
            );

        },100);
    }

    function stop()
    {
        clearInterval(
            timers[id]
        );

        timers[id] = null;

        publish(topic,"0");
    }

    btn.addEventListener(
        "pointerdown",
        start
    );

    btn.addEventListener(
        "pointerup",
        stop
    );

    btn.addEventListener(
        "pointercancel",
        stop
    );

    btn.addEventListener(
        "touchend",
        stop
    );

    btn.addEventListener(
        "touchcancel",
        stop
    );
}

/* Global Safety */

document.addEventListener(
"pointerup",
stopAllButtons
);

document.addEventListener(
"pointercancel",
stopAllButtons
);

document.addEventListener(
"touchend",
stopAllButtons
);

document.addEventListener(
"touchcancel",
stopAllButtons
);

window.addEventListener(
"blur",
stopAllButtons
);

document.addEventListener(
"visibilitychange",
()=>{
    if(document.hidden)
    {
        stopAllButtons();
    }
});

/* Turret */

bind(
"tl",
"excavator/turret/left"
);

bind(
"tr",
"excavator/turret/right"
);

/* Arm */

bind(
"au",
"excavator/arm/up"
);

bind(
"ad",
"excavator/arm/down"
);

/* Stick */

bind(
"su",
"excavator/stick/up"
);

bind(
"sd",
"excavator/stick/down"
);

/* Bucket */

bind(
"bu",
"excavator/bucket/up"
);

bind(
"bd",
"excavator/bucket/down"
);

/* Left Track */

bind(
"leftForward",
"excavator/left/fwd"
);

bind(
"leftBackward",
"excavator/left/rev"
);

/* Right Track */

bind(
"rightForward",
"excavator/right/fwd"
);

bind(
"rightBackward",
"excavator/right/rev"
);

</script>

</body>
</html>
