<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport"
content="width=device-width,initial-scale=1,user-scalable=no">

<title>Excavator Remote</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

*{
    box-sizing:border-box;
}

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;

    overflow:hidden;

    background:#222;

    color:white;

    font-family:Arial,sans-serif;

    touch-action:none;
}

#status{

    height:30px;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:14px;

    font-weight:bold;

    background:#111;
}

.connected{
    color:#00ff66;
}

.disconnected{
    color:#ff4444;
}

.container{

    height:calc(100vh - 30px);

    display:flex;

    flex-direction:row;

    justify-content:space-between;

    align-items:center;

    padding:5px;
}

.section{

    width:33.3%;

    height:100%;

    display:flex;

    justify-content:center;

    align-items:center;
}

.cross{

    display:grid;

    grid-template-columns:70px 70px 70px;
    grid-template-rows:70px 70px 70px;

    gap:8px;
}

.trackGrid{

    display:grid;

    grid-template-columns:80px 80px;
    grid-template-rows:80px 80px;

    gap:12px;
}

button{

    border:none;

    border-radius:12px;

    font-size:18px;

    font-weight:bold;

    background:white;

    color:black;

    touch-action:none;

    user-select:none;

    -webkit-user-select:none;

    box-shadow:
    0 2px 6px rgba(0,0,0,.4);
}

button:active{

    background:#4da6ff;

    color:white;
}

.empty{
    visibility:hidden;
}

@media (max-height:450px){

    .cross{

        grid-template-columns:
        60px 60px 60px;

        grid-template-rows:
        60px 60px 60px;
    }

    .trackGrid{

        grid-template-columns:
        70px 70px;

        grid-template-rows:
        70px 70px;
    }

    button{

        font-size:15px;
    }
}

</style>
</head>

<body>

<div id="status" class="disconnected">
MQTT Connecting...
</div>

<div class="container">

    <!-- LEFT -->
    <div class="section">

        <div class="cross">

            <div class="empty"></div>
            <button id="tl">↺</button>
            <div class="empty"></div>

            <button id="au">AU</button>
            <div class="empty"></div>
            <button id="ad">AD</button>

            <div class="empty"></div>
            <button id="tr">↻</button>
            <div class="empty"></div>

        </div>

    </div>

    <!-- CENTER -->
    <div class="section">

        <div class="trackGrid">

            <button id="lf">LF</button>
            <button id="rf">RF</button>

            <button id="lb">LB</button>
            <button id="rb">RB</button>

        </div>

    </div>

    <!-- RIGHT -->
    <div class="section">

        <div class="cross">

            <div class="empty"></div>
            <button id="su">SU</button>
            <div class="empty"></div>

            <button id="bu">BU</button>
            <div class="empty"></div>
            <button id="bd">BD</button>

            <div class="empty"></div>
            <button id="sd">SD</button>
            <div class="empty"></div>

        </div>

    </div>

</div>

<script>

// MQTT

const client =
mqtt.connect(
'wss://broker.hivemq.com:8884/mqtt'
);

const statusDiv =
document.getElementById("status");

client.on("connect",()=>{

    statusDiv.innerHTML =
    "MQTT Connected";

    statusDiv.className =
    "connected";
});

client.on("close",()=>{

    statusDiv.innerHTML =
    "MQTT Disconnected";

    statusDiv.className =
    "disconnected";
});

function publish(topic,value)
{
    if(client.connected)
    {
        client.publish(topic,value);
    }
}

// Multi Touch

const activeButtons = {};

function startButton(id, topic)
{
    if(activeButtons[id]) return;

    publish(topic,"1");

    activeButtons[id] = {

        topic:topic,

        timer:setInterval(()=>{

            publish(topic,"1");

        },100)
    };
}

function stopButton(id)
{
    if(!activeButtons[id]) return;

    clearInterval(
        activeButtons[id].timer
    );

    publish(
        activeButtons[id].topic,
        "0"
    );

    delete activeButtons[id];
}

function stopAllButtons()
{
    Object.keys(activeButtons)
    .forEach(id=>{

        clearInterval(
            activeButtons[id].timer
        );

        publish(
            activeButtons[id].topic,
            "0"
        );
    });

    for(const id in activeButtons)
    {
        delete activeButtons[id];
    }
}

function bind(id, topic)
{
    const btn =
    document.getElementById(id);

    btn.addEventListener(
        "pointerdown",
        e=>{
            e.preventDefault();
            startButton(id,topic);
        }
    );

    btn.addEventListener(
        "pointerup",
        e=>{
            e.preventDefault();
            stopButton(id);
        }
    );

    btn.addEventListener(
        "pointerleave",
        ()=>{
            stopButton(id);
        }
    );

    btn.addEventListener(
        "pointercancel",
        ()=>{
            stopButton(id);
        }
    );

    btn.addEventListener(
        "lostpointercapture",
        ()=>{
            stopButton(id);
        }
    );
}

// Safety

window.addEventListener(
    "blur",
    stopAllButtons
);

window.addEventListener(
    "pagehide",
    stopAllButtons
);

document.addEventListener(
    "visibilitychange",
    ()=>{
        if(document.hidden)
        {
            stopAllButtons();
        }
    }
);

// Topics

bind("lf","excavator/left/fwd");
bind("lb","excavator/left/rev");

bind("rf","excavator/right/fwd");
bind("rb","excavator/right/rev");

bind("tl","excavator/turret/left");
bind("tr","excavator/turret/right");

bind("au","excavator/arm/up");
bind("ad","excavator/arm/down");

bind("su","excavator/stick/up");
bind("sd","excavator/stick/down");

bind("bu","excavator/bucket/up");
bind("bd","excavator/bucket/down");

</script>

</body>
</html>
