<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>RC CAR</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;

  -webkit-user-select:none;
  user-select:none;

  -webkit-touch-callout:none;
}

body{

  background:#111;
  color:white;

  font-family:sans-serif;

  width:100vw;
  height:100vh;

  overflow:hidden;

  display:flex;
  flex-direction:row;

}

/* LEFT SIDE */

.left-panel{

  width:50%;
  height:100%;

  display:flex;
  justify-content:center;
  align-items:center;

}

/* RIGHT SIDE */

.right-panel{

  width:50%;
  height:100%;

  display:flex;
  justify-content:center;
  align-items:center;

}

/* D-PAD */

.dpad{

  position:relative;

  width:240px;
  height:240px;

}

.btn{

  position:absolute;

  width:90px;
  height:90px;

  border:none;
  border-radius:24px;

  background:#2b2b2b;

  color:white;

  font-size:22px;
  font-weight:bold;

  box-shadow:
  0 4px 10px rgba(0,0,0,0.4);

  transition:
  transform 0.05s,
  background 0.1s;

}

.btn:active{

  transform:scale(0.94);

  background:#4a4a4a;
}

/* POSITIONS */

.up{
  top:0;
  left:75px;
}

.down{
  bottom:0;
  left:75px;
}

.left{
  left:0;
  top:75px;
}

.right{
  right:0;
  top:75px;
}

/* LABEL */

.title{

  position:absolute;

  top:14px;
  left:50%;

  transform:translateX(-50%);

  font-size:18px;

  color:#888;

  letter-spacing:3px;
}

</style>

</head>

<body>

<div class="title">
RC CAR CONTROL
</div>

<!-- LEFT SIDE -->
<div class="left-panel">

  <div class="dpad">

    <button
    class="btn up"

    ontouchstart="send('forward_on')"
    ontouchend="send('forward_off')"

    onmousedown="send('forward_on')"
    onmouseup="send('forward_off')"
    >
    ▲
    </button>

    <button
    class="btn down"

    ontouchstart="send('backward_on')"
    ontouchend="send('backward_off')"

    onmousedown="send('backward_on')"
    onmouseup="send('backward_off')"
    >
    ▼
    </button>

  </div>

</div>

<!-- RIGHT SIDE -->
<div class="right-panel">

  <div class="dpad">

    <button
    class="btn left"

    ontouchstart="send('left_on')"
    ontouchend="send('left_off')"

    onmousedown="send('left_on')"
    onmouseup="send('left_off')"
    >
    ◀
    </button>

    <button
    class="btn right"

    ontouchstart="send('right_on')"
    ontouchend="send('right_off')"

    onmousedown="send('right_on')"
    onmouseup="send('right_off')"
    >
    ▶
    </button>

  </div>

</div>

<script>

const client = mqtt.connect(
'wss://broker.hivemq.com:8884/mqtt'
);

client.on('connect', ()=>{

  console.log('MQTT Connected');

});

function send(msg){

  client.publish(
    'fungcar/control',
    msg
  );

  console.log(msg);
}

/* SAFETY STOP */

window.addEventListener('touchend', ()=>{

  send('forward_off');
  send('backward_off');
  send('left_off');
  send('right_off');

});

window.addEventListener('mouseup', ()=>{

  send('forward_off');
  send('backward_off');
  send('left_off');
  send('right_off');

});

</script>

</body>

</html>
