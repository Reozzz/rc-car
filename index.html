<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport"
content="width=device-width,initial-scale=1,user-scalable=no">

<title>Excavator Remote</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;

    overflow:hidden;

    touch-action:none;
    overscroll-behavior:none;

    background:#f2f2f2;
    font-family:Arial,sans-serif;
}

#status{
    text-align:center;
    font-size:20px;
    font-weight:bold;
    padding:10px;
}

.connected{
    color:green;
}

.disconnected{
    color:red;
}

.main{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:5px;
}

.joystick{
    width:45%;
}

.grid{
    display:grid;
    grid-template-columns:100px 100px 100px;
    grid-template-rows:100px 100px 100px;
    gap:6px;
    justify-content:center;
}

button{

    border:none;
    border-radius:12px;

    font-size:24px;

    background:white;

    box-shadow:
    0 2px 6px rgba(0,0,0,0.2);

    user-select:none;
    -webkit-user-select:none;

    touch-action:none;
}

button:active{
    background:#d7ebff;
}

.empty{
    visibility:hidden;
}

.trackRow{

    display:flex;

    justify-content:center;

    gap:20px;

    margin-top:15px;
}

.trackGroup{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.trackGroup button{

    width:180px;
    height:70px;
}

.bucket{

    text-align:center;

    margin-top:15px;
}

.bucket button{

    width:380px;
    height:70px;

    margin:5px;
}

h3{
    text-align:center;
    margin-bottom:10px;
}

</style>

</head>

<body>

<div id="status" class="disconnected">
MQTT Connecting...
</div>

<div class="main">

    <!-- LEFT SIDE -->

    <div class="joystick">

        <h3>Turret</h3>

        <div class="grid">

            <div class="empty"></div>
            <button id="tl">↺</button>
            <div class="empty"></div>

            <button id="lf">▲</button>
            <div class="empty"></div>
            <button id="lb">▼</button>

            <div class="empty"></div>
            <button id="tr">↻</button>
            <div class="empty"></div>

        </div>

    </div>

    <!-- RIGHT SIDE -->

    <div class="joystick">

        <h3>Arm / Stick</h3>

        <div class="grid">

            <div class="empty"></div>
            <button id="au">▲</button>
            <div class="empty"></div>

            <button id="su">◀</button>
            <div class="empty"></div>
            <button id="sd">▶</button>

            <div class="empty"></div>
            <button id="ad">▼</button>
            <div class="empty"></div>

        </div>

    </div>

</div>

<div class="trackRow">

    <div class="trackGroup">

        <h3>Left Track</h3>

        <button id="leftForward">
            Forward
        </button>

        <button id="leftBackward">
            Backward
        </button>

    </div>

    <div class="trackGroup">

        <h3>Right Track</h3>

        <button id="rightForward">
            Forward
        </button>

        <button id="rightBackward">
            Backward
        </button>

    </div>

</div>

<div class="bucket">

    <h3>Bucket</h3>

    <button id="bu">
        Bucket Up
    </button>

    <br>

    <button id="bd">
        Bucket Down
    </button>

</div>

<script>

// =====================
// MQTT
// =====================

const client =
mqtt.connect(
'wss://broker.hivemq.com:8884/mqtt'
);

const statusDiv =
document.getElementById("status");

client.on("connect",()=>{

    statusDiv.innerHTML =
    "MQTT Connected";

    statusDiv.className =
    "connected";
});

client.on("close",()=>{

    statusDiv.innerHTML =
    "MQTT Disconnected";

    statusDiv.className =
    "disconnected";
});

function publish(topic,value)
{
    if(client.connected)
    {
        client.publish(topic,value);
    }
}

// =====================
// Multi Touch Manager
// =====================

const activeButtons = {};

function startButton(id, topic)
{
    if(activeButtons[id])
        return;

    publish(topic,"1");

    activeButtons[id] =
    {
        topic: topic,
        timer: setInterval(()=>{

            publish(topic,"1");

        },100)
    };
}

function stopButton(id)
{
    if(!activeButtons[id])
        return;

    clearInterval(
        activeButtons[id].timer
    );

    publish(
        activeButtons[id].topic,
        "0"
    );

    delete activeButtons[id];
}

function stopAllButtons()
{
    Object.keys(activeButtons)
    .forEach(id=>{

        clearInterval(
            activeButtons[id].timer
        );

        publish(
            activeButtons[id].topic,
            "0"
        );
    });

    for(const id in activeButtons)
    {
        delete activeButtons[id];
    }
}

// =====================
// Bind
// =====================

function bind(id, topic)
{
    const btn =
    document.getElementById(id);

    btn.addEventListener(
        "pointerdown",
        e=>{
            e.preventDefault();
            startButton(id,topic);
        }
    );

    btn.addEventListener(
        "pointerup",
        e=>{
            e.preventDefault();
            stopButton(id);
        }
    );

    btn.addEventListener(
        "pointercancel",
        ()=>{
            stopButton(id);
        }
    );

    btn.addEventListener(
        "lostpointercapture",
        ()=>{
            stopButton(id);
        }
    );
}

// =====================
// Emergency Stop
// =====================

window.addEventListener(
    "blur",
    stopAllButtons
);

document.addEventListener(
    "visibilitychange",
    ()=>{
        if(document.hidden)
        {
            stopAllButtons();
        }
    }
);

window.addEventListener(
    "pagehide",
    stopAllButtons
);

// =====================
// Topics
// =====================

// Left Track

bind(
"leftForward",
"excavator/left/fwd"
);

bind(
"leftBackward",
"excavator/left/rev"
);

// Right Track

bind(
"rightForward",
"excavator/right/fwd"
);

bind(
"rightBackward",
"excavator/right/rev"
);

// Turret

bind(
"tl",
"excavator/turret/left"
);

bind(
"tr",
"excavator/turret/right"
);

// Main Arm

bind(
"au",
"excavator/arm/up"
);

bind(
"ad",
"excavator/arm/down"
);

// Stick Arm

bind(
"su",
"excavator/stick/up"
);

bind(
"sd",
"excavator/stick/down"
);

// Bucket

bind(
"bu",
"excavator/bucket/up"
);

bind(
"bd",
"excavator/bucket/down"
);

</script>

</body>
</html>
