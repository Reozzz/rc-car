<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="
width=device-width,
height=device-height,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no
">

<title>ESP32 RC CAR</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;

  -webkit-user-select:none;
  user-select:none;

  -webkit-touch-callout:none;
}

body{

  width:100vw;
  height:100vh;

  overflow:hidden;

  background:#111;

  color:white;

  font-family:
  Arial,
  sans-serif;

  display:flex;
  flex-direction:row;
}

/* =========================
   LEFT PANEL
========================= */

.left-panel{

  width:50%;
  height:100%;

  display:flex;
  justify-content:center;
  align-items:center;

  position:relative;
}

/* =========================
   THROTTLE
========================= */

.throttle-container{

  display:flex;
  justify-content:center;
  align-items:center;

  width:100%;
  height:100%;
}

#throttle{

  appearance:none;
  -webkit-appearance:none;

  width:320px;
  height:70px;

  transform:rotate(-90deg);

  background:transparent;
}

/* TRACK */

#throttle::-webkit-slider-runnable-track{

  height:18px;

  background:#333;

  border-radius:20px;
}

/* THUMB */

#throttle::-webkit-slider-thumb{

  -webkit-appearance:none;

  width:70px;
  height:70px;

  border-radius:50%;

  background:#00bfff;

  margin-top:-26px;

  box-shadow:
  0 0 20px rgba(0,191,255,0.5);
}

/* =========================
   RIGHT PANEL
========================= */

.right-panel{

  width:50%;
  height:100%;

  display:flex;
  justify-content:center;
  align-items:center;
}

/* =========================
   STEERING
========================= */

.steering{

  width:260px;
  height:260px;

  position:relative;
}

.btn{

  position:absolute;

  width:110px;
  height:110px;

  border:none;
  border-radius:28px;

  background:#2a2a2a;

  color:white;

  font-size:42px;
  font-weight:bold;

  box-shadow:
  0 6px 16px rgba(0,0,0,0.45);

  transition:
  transform 0.05s,
  background 0.1s;
}

.btn:active{

  transform:scale(0.94);

  background:#444;
}

/* LEFT */

.left{

  left:0;
  top:75px;
}

/* RIGHT */

.right{

  right:0;
  top:75px;
}

/* LABELS */

.label{

  position:absolute;

  top:18px;

  width:100%;

  text-align:center;

  color:#777;

  letter-spacing:3px;

  font-size:18px;
}

</style>

</head>

<body>

<!-- =========================
     LEFT PANEL
========================= -->

<div class="left-panel">

  <div class="label">
    THROTTLE
  </div>

  <div class="throttle-container">

    <input
    type="range"

    min="-100"
    max="100"

    value="0"

    id="throttle"
    >

  </div>

</div>

<!-- =========================
     RIGHT PANEL
========================= -->

<div class="right-panel">

  <div class="label">
    STEERING
  </div>

  <div class="steering">

    <!-- LEFT -->

    <button

    class="btn left"

    ontouchstart="send('left_on')"
    ontouchend="send('left_off')"

    onmousedown="send('left_on')"
    onmouseup="send('left_off')"

    >
    ◀
    </button>

    <!-- RIGHT -->

    <button

    class="btn right"

    ontouchstart="send('right_on')"
    ontouchend="send('right_off')"

    onmousedown="send('right_on')"
    onmouseup="send('right_off')"

    >
    ▶
    </button>

  </div>

</div>

<script>

/* =========================
   MQTT
========================= */

const client =
mqtt.connect(
'wss://broker.hivemq.com:8884/mqtt'
);

client.on(
'connect',
()=>{

  console.log(
    'MQTT Connected'
  );

});

/* =========================
   TOPICS
========================= */

const TOPIC_CONTROL =
'fungcar/control';

const TOPIC_THROTTLE =
'fungcar/throttle';

/* =========================
   SEND CONTROL
========================= */

function send(msg){

  client.publish(
    TOPIC_CONTROL,
    msg
  );

  console.log(msg);
}

/* =========================
   THROTTLE
========================= */

const throttle =
document.getElementById(
'throttle'
);

/* SEND PWM VALUE */

throttle.addEventListener(
'input',
()=>{

  let val =
  throttle.value;

  client.publish(
    TOPIC_THROTTLE,
    val.toString()
  );

});

/* AUTO RETURN CENTER */

function resetThrottle(){

  throttle.value = 0;

  client.publish(
    TOPIC_THROTTLE,
    '0'
  );
}

/* RELEASE */

throttle.addEventListener(
'mouseup',
resetThrottle
);

throttle.addEventListener(
'touchend',
resetThrottle
);

/* =========================
   SAFETY STOP
========================= */

window.addEventListener(
'touchend',
()=>{

  send('left_off');
  send('right_off');

});

window.addEventListener(
'mouseup',
()=>{

  send('left_off');
  send('right_off');

});

</script>

</body>

</html>
